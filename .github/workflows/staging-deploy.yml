name: Doow Web — Staging Deploy (App Service)

on:
  push:
    branches:
      - staging
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - staging

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: doowserver
  ACR_LOGIN_SERVER: doowserver.azurecr.io
  APP_NAME: doow-web-staging
  RESOURCE_GROUP: rg-doow-aria

jobs:
  build_and_deploy:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    name: Build and Deploy to App Service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ env.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AGENT_CICD_CLIENT_ID }}
          tenant-id: ${{ secrets.AGENT_CICD_TENANT_ID }}
          subscription-id: ${{ secrets.AGENT_CICD_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:staging
          build-args: |
            NEXT_PUBLIC_BLOB_BASE_URL=${{ secrets.NEXT_PUBLIC_BLOB_BASE_URL }}
            NEXT_PUBLIC_DOOW_APP_BASE_URL=${{ secrets.NEXT_PUBLIC_DOOW_APP_BASE_URL }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            BLOG_LIVE=${{ secrets.BLOG_LIVE }}

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ steps.meta.outputs.tag }} \
            --docker-registry-server-url https://${{ env.ACR_LOGIN_SERVER }}

          az webapp restart \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
