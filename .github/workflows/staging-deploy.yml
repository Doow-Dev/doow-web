name: Doow Web — Staging Deploy (App Service)

on:
  push:
    branches:
      - staging

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_BLOB_BASE_URL: ${{ secrets.NEXT_PUBLIC_BLOB_BASE_URL }}
          NEXT_PUBLIC_DOOW_APP_BASE_URL: ${{ secrets.NEXT_PUBLIC_DOOW_APP_BASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          BLOG_LIVE: ${{ secrets.BLOG_LIVE }}
        run: npm run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AGENT_CICD_CLIENT_ID }}
          tenant-id: ${{ secrets.AGENT_CICD_TENANT_ID }}
          subscription-id: ${{ secrets.AGENT_CICD_SUBSCRIPTION_ID }}

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: landing-page
          resource-group-name: Doow-dev
          slot-name: staging
          package: .

      - name: Deploy to production slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: landing-page
          resource-group-name: Doow-dev
          slot-name: production
          package: .
