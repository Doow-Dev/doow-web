name: Monorepo CI

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging

jobs:
  verify:
    name: Verify monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check import boundaries
        run: pnpm check:boundaries

      - name: Check deployment config
        run: pnpm check:deployment

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run package and app tests
        run: pnpm test

      - name: Check content
        run: pnpm check:content

      - name: Build web app
        run: pnpm --filter @doow/web build

      - name: Build docs app
        run: pnpm --filter @doow/docs build

      - name: Root verification
        run: pnpm verify
