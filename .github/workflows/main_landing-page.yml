name: Doow Web — Production Deploy (App Service)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_BLOB_BASE_URL: ${{ secrets.NEXT_PUBLIC_BLOB_BASE_URL }}
          NEXT_PUBLIC_DOOW_APP_BASE_URL: ${{ secrets.NEXT_PUBLIC_DOOW_APP_BASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          BLOG_LIVE: ${{ secrets.BLOG_LIVE }}
          CATALOG_ADMIN_KEY: ${{ secrets.CATALOG_ADMIN_KEY }}
          DOOW_API_BASE_URL: ${{ secrets.DOOW_API_BASE_URL }}
          X_ADMIN_SECRET: ${{ secrets.X_ADMIN_SECRET }}
          NEXT_PUBLIC_CRISP_WEBSITE_ID: ${{ secrets.NEXT_PUBLIC_CRISP_WEBSITE_ID }}
        run: pnpm build:web

      - name: Prepare standalone package
        run: |
          # Monorepo: server.js lives at apps/web/ within the standalone tree
          mkdir -p apps/web/.next/standalone/apps/web
          cp -r apps/web/public apps/web/.next/standalone/apps/web/
          mkdir -p apps/web/.next/standalone/apps/web/.next
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          echo '{"name":"doow-web","version":"0.1.0","scripts":{"start":"node apps/web/server.js"}}' > apps/web/.next/standalone/package.json
          cd apps/web/.next/standalone
          # Resolve pnpm symlinks in root node_modules so .pnpm/ has real files
          cp -rL node_modules node_modules_resolved
          rm -rf node_modules
          mv node_modules_resolved node_modules
          # Resolve symlinks in apps/web/node_modules (next is a symlink; must be a
          # real directory before we merge packages into it)
          cp -rL apps/web/node_modules apps/web/node_modules_resolved
          rm -rf apps/web/node_modules
          mv apps/web/node_modules_resolved apps/web/node_modules
          # Azure strips the root node_modules/ on zip deployment but preserves
          # nested node_modules/. Hoist the pnpm virtual-store packages (@swc/helpers
          # etc.) into apps/web/node_modules/ so they survive and Node can resolve them.
          if [ -d node_modules/.pnpm/node_modules ]; then
            cp -rn node_modules/.pnpm/node_modules/. apps/web/node_modules/
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C1F6479EE331409FB37827C3C24DD4F1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9B4206EE64A744E491F3B808D299976E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2B9FC860620B4599808A1823D86D21C0 }}

      - name: Set startup command
        run: |
          az webapp config set \
            --name landing-page \
            --resource-group Doow-dev \
            --startup-file "node apps/web/server.js"

      - name: Set runtime app settings
        run: |
          az webapp config appsettings set \
            --name landing-page \
            --resource-group Doow-dev \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              DOOW_API_BASE_URL="${{ secrets.DOOW_API_BASE_URL }}" \
              CATALOG_ADMIN_KEY="${{ secrets.CATALOG_ADMIN_KEY }}" \
              X_ADMIN_SECRET="${{ secrets.X_ADMIN_SECRET }}" \
              BLOG_LIVE="${{ secrets.BLOG_LIVE }}" \
              CRISP_API_IDENTIFIER="${{ secrets.CRISP_API_IDENTIFIER }}" \
              CRISP_API_KEY="${{ secrets.CRISP_API_KEY }}"

      - name: Zip standalone bundle
        run: (cd apps/web/.next/standalone && zip -r ../../../../standalone.zip . -x "*.git*")

      - name: Deploy standalone bundle to production
        run: |
          az webapp deploy \
            --name landing-page \
            --resource-group Doow-dev \
            --src-path standalone.zip \
            --type zip \
            --clean true \
            --async false

      - name: Remove Oryx artifacts from wwwroot
        run: |
          CREDS=$(az webapp deployment list-publishing-credentials \
            --name landing-page --resource-group Doow-dev \
            --query '{user:publishingUserName,pass:publishingPassword}' -o json)
          KUDU_USER=$(echo $CREDS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['user'])")
          KUDU_PASS=$(echo $CREDS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['pass'])")
          KUDU_URL="https://landing-page-czbyg4h0c0ctbbgb.scm.canadacentral-01.azurewebsites.net"
          curl -s -u "$KUDU_USER:$KUDU_PASS" -X DELETE -H "If-Match: *" "$KUDU_URL/api/vfs/site/wwwroot/oryx-manifest.toml" || true
