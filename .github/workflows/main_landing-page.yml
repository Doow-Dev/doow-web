name: Doow Web — Production Deploy (App Service)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_BLOB_BASE_URL: ${{ secrets.NEXT_PUBLIC_BLOB_BASE_URL }}
          NEXT_PUBLIC_DOOW_APP_BASE_URL: ${{ secrets.NEXT_PUBLIC_DOOW_APP_BASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          BLOG_LIVE: ${{ secrets.BLOG_LIVE }}
        run: npm run build

      - name: Prepare standalone package
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/static
          rm -f .next/standalone/.next/oryx-manifest.toml
          echo '{"name":"doow-web","version":"0.1.0","scripts":{"start":"node server.js"}}' > .next/standalone/package.json
          cd .next/standalone && tar -czf node_modules.tar.gz node_modules/ && rm -rf node_modules/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C1F6479EE331409FB37827C3C24DD4F1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9B4206EE64A744E491F3B808D299976E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2B9FC860620B4599808A1823D86D21C0 }}

      - name: Set startup command
        run: |
          az webapp config set \
            --name landing-page \
            --resource-group Doow-dev \
            --startup-file "node server.js"

      - name: Set runtime app settings
        run: |
          az webapp config appsettings set \
            --name landing-page \
            --resource-group Doow-dev \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              DOOW_API_BASE_URL="${{ secrets.DOOW_API_BASE_URL }}" \
              CATALOG_ADMIN_KEY="${{ secrets.CATALOG_ADMIN_KEY }}" \
              X_ADMIN_SECRET="${{ secrets.X_ADMIN_SECRET }}" \
              BLOG_LIVE="${{ secrets.BLOG_LIVE }}"

      - name: Zip standalone bundle
        run: (cd .next/standalone && zip -r ../../standalone.zip . -x "*.git*")

      - name: Deploy standalone bundle to production
        run: |
          az webapp deploy \
            --name landing-page \
            --resource-group Doow-dev \
            --src-path standalone.zip \
            --type zip \
            --clean true \
            --async false
